<section class="fighters" aria-label="Two researchers, sparring.">

  <a href="/people/yuchen.html" class="fighter-link">
    <div class="bubble"><span>Liu Yuchen</span></div>
    <svg viewBox="0 0 18 30" xmlns="http://www.w3.org/2000/svg" class="fighter fighter-1" role="img">
      <title>Liu Yuchen — slate</title>
      <g shape-rendering="crispEdges" class="fighter-rig">

        <!-- BODY layer first (underneath) -->
        <g fill="#1f4870">
          <rect x="4" y="15" width="10" height="2"/>
          <rect x="3" y="17" width="12" height="3"/>
          <rect x="4" y="20" width="10" height="2"/>

        </g>
        <rect x="8" y="22" width="2" height="2" fill="#133456"/>
        <g fill="#2a5e9c">
          <rect x="4" y="17" width="1" height="3"/>
          <rect x="6" y="17" width="1" height="1"/>
        </g>

        <!-- GLOVES -->
        <g fill="#b89e7a">
          <rect x="2" y="17" width="2" height="3"/>
          <rect x="14" y="17" width="2" height="3"/>
          <rect x="1" y="18" width="1" height="2"/>
          <rect x="16" y="18" width="1" height="2"/>
        </g>
        <g fill="#1a1816">
          <rect x="2" y="17" width="2" height="1"/>
          <rect x="14" y="17" width="2" height="1"/>
        </g>

        <!-- SHOES -->
        <g fill="#1a1816">
          <rect x="5" y="28" width="3" height="2"/>
          <rect x="10" y="28" width="3" height="2"/>
        </g>

        <!-- HEAD outline + hair -->
        <g fill="#1a1816">
          <rect x="5" y="1" width="8" height="1"/>
          <rect x="4" y="2" width="10" height="3"/>
          <rect x="4" y="5" width="1" height="3"/>
          <rect x="13" y="5" width="1" height="3"/>
          <rect x="4" y="8" width="1" height="1"/>
          <rect x="13" y="8" width="1" height="1"/>
        </g>

        <!-- SKIN -->
        <g fill="#d4b896">
          <rect x="5" y="5" width="8" height="3"/>
          <rect x="5" y="8" width="8" height="3"/>
          <rect x="5" y="11" width="8" height="2"/>
          <rect x="6" y="13" width="6" height="2"/>
        </g>

        <!-- EYE BROWS -->
        <g fill="#1a1816">
          <rect x="6" y="7" width="2" height="1"/>
          <rect x="10" y="7" width="2" height="1"/>
        </g>

        <!-- EYES (looking right, toward Muchen) -->
        <g fill="#1a1816">
          <rect x="7" y="9" width="1" height="1"/>
          <rect x="11" y="9" width="1" height="1"/>
        </g>

        <!-- MOUTH -->
        <rect x="8" y="12" width="2" height="1" fill="#1a1816"/>

        <!-- JAW shadow -->
        <rect x="7" y="14" width="4" height="1" fill="#c4a986"/>
      </g>
    </svg>
  </a>
