    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" class="fighter fighter-1" role="img">
      <title>Liu Yuchen — bluebird</title>
      <g shape-rendering="crispEdges" class="bird-rig">

        <!-- BODY outline (dark blue silhouette) -->
        <g fill="#152647">
          <rect x="11" y="3" width="11" height="1"/>
          <rect x="9"  y="4" width="2" height="1"/><rect x="22" y="4" width="2" height="1"/>
          <rect x="8"  y="5" width="1" height="2"/><rect x="24" y="5" width="1" height="2"/>
          <rect x="7"  y="7" width="1" height="5"/><rect x="25" y="7" width="1" height="5"/>
          <rect x="7"  y="12" width="1" height="3"/><rect x="25" y="12" width="1" height="3"/>
          <rect x="6"  y="15" width="1" height="7"/><rect x="26" y="15" width="1" height="7"/>
          <rect x="7"  y="22" width="1" height="2"/><rect x="25" y="22" width="1" height="2"/>
          <rect x="8"  y="24" width="3" height="1"/><rect x="22" y="24" width="3" height="1"/>
          <rect x="11" y="25" width="11" height="1"/>
        </g>

        <!-- BODY BLUE main -->
        <g fill="#4d7ec9">
          <rect x="11" y="4" width="11" height="1"/>
          <rect x="9"  y="5" width="15" height="2"/>
          <rect x="8"  y="7" width="17" height="5"/>
          <rect x="8"  y="12" width="17" height="3"/>
          <rect x="7"  y="15" width="19" height="7"/>
          <rect x="8"  y="22" width="17" height="2"/>
          <rect x="11" y="24" width="11" height="1"/>
        </g>

        <!-- WING (folded, slightly darker patch on side) -->
        <g fill="#26528f" class="bird-wing">
          <rect x="9"  y="15" width="6" height="1"/>
          <rect x="8"  y="16" width="8" height="1"/>
          <rect x="8"  y="17" width="9" height="1"/>
          <rect x="9"  y="18" width="8" height="1"/>
          <rect x="9"  y="19" width="7" height="1"/>
          <rect x="10" y="20" width="5" height="1"/>
        </g>

        <!-- BELLY cream (right/lower) -->
        <g fill="#f0ebde">
          <rect x="17" y="18" width="8" height="1"/>
          <rect x="17" y="19" width="8" height="1"/>
          <rect x="17" y="20" width="8" height="1"/>
          <rect x="16" y="21" width="9" height="1"/>
          <rect x="15" y="22" width="10" height="1"/>
          <rect x="15" y="23" width="9" height="1"/>
        </g>

        <!-- HUGE round EYE (white sclera) -->
        <g fill="#f5f2e8">
          <rect x="15" y="8" width="6" height="6"/>
          <rect x="14" y="9" width="1" height="4"/>
          <rect x="21" y="9" width="1" height="4"/>
        </g>
        <!-- pupil -->
        <g fill="#0a0c14">
          <rect x="17" y="9" width="3" height="4"/>
          <rect x="16" y="10" width="1" height="2"/>
          <rect x="20" y="10" width="1" height="2"/>
        </g>
        <!-- sparkle -->
        <rect x="17" y="9" width="1" height="1" fill="#f5f2e8"/>
        <rect x="19" y="12" width="1" height="1" fill="#f5f2e8"/>

        <!-- TINY BEAK (small triangle on the right) -->
        <g fill="#e8a93f">
          <rect x="25" y="10" width="2" height="1"/>
          <rect x="25" y="11" width="3" height="1"/>
          <rect x="25" y="12" width="2" height="1"/>
        </g>
        <rect x="27" y="11" width="1" height="1" fill="#a06e1a"/>

        <!-- CHEEK blush -->
        <rect x="22" y="11" width="2" height="2" fill="#e2a3a3"/>

        <!-- LEGS / FEET (tiny chibi feet) -->
        <g fill="#d68c47">
          <rect x="12" y="25" width="2" height="2"/>
          <rect x="19" y="25" width="2" height="2"/>
        </g>
        <g fill="#a06420">
          <rect x="10" y="27" width="6" height="1"/>
          <rect x="17" y="27" width="6" height="1"/>
        </g>

      </g>
    </svg>
  </a>

  <a href="https://miranda.φ.monster/" class="fighter-link">
    <div class="bubble"><span>Han Muchen</span></div>
    <svg viewBox="0 0 48 28" xmlns="http://www.w3.org/2000/svg" class="fighter fighter-2" role="img">
      <title>Han Muchen — great white</title>
      <g shape-rendering="crispEdges" class="shark-rig">

        <!-- DORSAL FIN (rounded chibi) -->
        <g fill="#4a5a68">
          <rect x="23" y="2" width="3" height="1"/>
          <rect x="22" y="3" width="5" height="1"/>
          <rect x="21" y="4" width="7" height="1"/>
        </g>

        <!-- BODY outline / back darker -->
        <g fill="#3a4858">
          <rect x="9"  y="6" width="4" height="1"/>
          <rect x="13" y="6" width="3" height="1"/>
          <rect x="29" y="6" width="3" height="1"/>
          <rect x="32" y="6" width="3" height="1"/>
          <rect x="6"  y="7" width="3" height="1"/>
          <rect x="34" y="7" width="3" height="1"/>
          <rect x="4"  y="8" width="2" height="1"/>
          <rect x="36" y="8" width="2" height="1"/>
        </g>

        <!-- BODY GRAY back -->
        <g fill="#7a8694">
          <rect x="16" y="6" width="13" height="1"/>
          <rect x="9"  y="7" width="25" height="1"/>
          <rect x="6"  y="8" width="30" height="1"/>
          <rect x="4"  y="9" width="33" height="1"/>
          <rect x="3"  y="10" width="34" height="1"/>
          <rect x="3"  y="11" width="34" height="1"/>
          <rect x="3"  y="12" width="34" height="1"/>
          <rect x="3"  y="13" width="34" height="1"/>
        </g>

        <!-- BODY light gray belly transition -->
        <g fill="#a5b1bc">
          <rect x="3"  y="14" width="34" height="1"/>
          <rect x="4"  y="15" width="33" height="1"/>
          <rect x="5"  y="16" width="32" height="1"/>
        </g>

        <!-- BELLY cream -->
        <g fill="#f0ebde">
          <rect x="6"  y="17" width="30" height="1"/>
          <rect x="8"  y="18" width="26" height="1"/>
          <rect x="11" y="19" width="20" height="1"/>
          <rect x="14" y="20" width="14" height="1"/>
          <rect x="18" y="21" width="6"  height="1"/>
        </g>

        <!-- SNOUT round tip -->
        <g fill="#7a8694">
          <rect x="2"  y="11" width="1" height="2"/>
        </g>

        <!-- HUGE EYE -->
        <g fill="#f5f2e8">
          <rect x="9"  y="8" width="5" height="5"/>
          <rect x="8"  y="9" width="1" height="3"/>
          <rect x="14" y="9" width="1" height="3"/>
        </g>
        <g fill="#0a0c14">
          <rect x="10" y="9" width="3" height="3"/>
        </g>
        <!-- sparkle (two highlights so it reads as anime-cute) -->
        <rect x="10" y="9" width="1" height="1" fill="#f5f2e8"/>
        <rect x="12" y="11" width="1" height="1" fill="#f5f2e8"/>

        <!-- SMILE MOUTH — gentle curve, corners angle up -->
        <g class="shark-jaw">
          <g fill="#3a2630">
            <!-- mouth line: starts low on left, sweeps up to right corner -->
            <rect x="3"  y="14" width="1" height="1"/>
            <rect x="4"  y="15" width="6" height="1"/>
            <rect x="10" y="14" width="1" height="1"/>
            <rect x="11" y="13" width="2" height="1"/>
          </g>
          <!-- tiny fang teeth (just 2 little white dots) -->
          <g fill="#f5f2e8">
            <rect x="6" y="15" width="1" height="1"/>
            <rect x="8" y="15" width="1" height="1"/>
          </g>
        </g>

        <!-- CHEEK blush -->
        <rect x="14" y="14" width="3" height="2" fill="#d6a09a"/>

        <!-- GILL slits (subtle, only 2 for chibi cleanness) -->
        <g fill="#4a5a68">
          <rect x="17" y="10" width="1" height="3"/>
          <rect x="19" y="10" width="1" height="3"/>
        </g>

        <!-- PECTORAL FIN (smaller, rounded) -->
        <g fill="#4a5a68">
          <rect x="16" y="17" width="7" height="1"/>
          <rect x="15" y="18" width="9" height="1"/>
          <rect x="16" y="19" width="7" height="1"/>
          <rect x="18" y="20" width="4" height="1"/>
        </g>

        <!-- TAIL chibi (smaller, rounded crescent) -->
        <g fill="#4a5a68">
          <rect x="40" y="6"  width="2" height="2"/>
          <rect x="39" y="8"  width="3" height="2"/>
          <rect x="38" y="10" width="3" height="2"/>
          <rect x="38" y="12" width="3" height="2"/>
          <rect x="39" y="14" width="2" height="2"/>
          <rect x="40" y="16" width="1" height="1"/>
        </g>

      </g>
